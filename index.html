<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Laboratório do Futuro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="loading">
        <div class="loader"></div>
        <p>Carregando possibilidades de futuro...</p>
    </div>

    <header class="topo">

        <h1>🚀 Laboratório do Futuro</h1>
        <p>Explore possíveis versões da sua vida</p>

    </header>

    <main class="container">

        <section class="card">
            <label>👤 Seu nome</label>
            <input id="nome" placeholder="Digite seu nome">
        </section>

        <section class="card">
            <label>💼 Área profissional</label>
            <select id="area_profissional"></select>
        </section>

        <section class="card">
            <label>🌱 Estilo de vida</label>
            <select id="estilo_vida"></select>
        </section>

        <section class="card">
            <label>🏡 Moradia</label>
            <select id="moradia"></select>
        </section>

        <section class="card">
            <label>🎓 Formação</label>
            <select id="formacao"></select>
        </section>

        <section class="card">
            <label>❤️ Estrutura familiar</label>
            <select id="familia"></select>
        </section>

        <section class="card">
            <label>🎯 Hobbies (até 3)</label>
            <div id="hobbies" class="chips"></div>
        </section>

        <section class="card">
            <label>⭐ Valores pessoais (até 3)</label>
            <div id="valores" class="chips"></div>
        </section>

        <section class="card">
            <label>🌍 Impacto coletivo</label>
            <select id="impacto_coletivo"></select>
        </section>

        <section class="card">
            <label>🧠 Quem influencia suas ideias de futuro? (até 3)</label>
            <div id="influencias" class="chips"></div>
        </section>

        <section class="card">
            <label>🔑 3 palavras que definem seu futuro</label>
            <input id="palavras_futuro">
        </section>

        <section class="card">
            <label>📖 Como seria um dia da sua vida nesse futuro?</label>
            <textarea id="narrativa"></textarea>
        </section>

        <button id="enviar">Enviar meu futuro 🚀</button>

    </main>

    <script src="script.js"></script>

</body>

</html>
