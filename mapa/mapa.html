<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa de Futuros da Turma</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="topo">
        <h1>🌍 Mapa de Futuros da Turma</h1>
        <p>O que a turma imagina para o futuro</p>
    </header>

    <main class="container">

        <section class="card insights-card">
            <h2>📊 Insights gerais</h2>
            <div id="insights"></div>
        </section>

        <section class="card">
            <h2>💼 Áreas profissionais</h2>
            <div id="areas" class="barras-container"></div>
        </section>

        <section class="card">
            <h2>⭐ Valores mais citados</h2>
            <div id="valores" class="barras-container"></div>
        </section>

        <section class="card">
            <h2>🌍 Impacto coletivo</h2>
            <div id="impacto" class="barras-container"></div>
        </section>

        <section class="card">
            <h2>🧠 Influências</h2>
            <div id="influencias" class="barras-container"></div>
        </section>

        <section class="card">
            <h2>🔑 Palavras do futuro</h2>
            <div id="palavras" class="nuvem"></div>
        </section>

        <section class="card">
            <h2>🧬 Arquétipos de futuro (Área + Valor)</h2>
            <div id="arquetipos" class="barras-container"></div>
        </section>

    </main>

    <script src="mapa.js"></script>
</body>

</html>
